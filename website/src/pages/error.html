  <body>
    <script>
      function goHome() {
        const parts = location.host.split('.');
        let new_location = `${location.protocol}//${parts.at(-2)}.${parts.at(-1)}`;
        window.location.href = new_location;
      }
    </script>
    <div class="main-container"> <!--evil flexbox >:)-->
        <p class="error-text">
            there was an error :(
        </p>
    </div>
    <div class="fixed-footer">
        <a href="javascript:void(0);" onclick="goHome()" class="back-button"></a>
    </div>
  </body>

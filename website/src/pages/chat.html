<!DOCTYPE html>
<!----yeah--------------------------------------------->
<!----why are you even in here------------------------->
<!----it's not that interesting------------------------>
<html lang="en">
    <head>
        <title>chat</title>
        <link rel="icon" href="../res/favicon.ico">
        <link rel="stylesheet" href="chat.css">
        <link rel="stylesheet" href="ui.css">

        <script type="module" src="common.js"></script>
        <!--<script type="module" src="voice.js"></script>-->

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="font.css" rel="stylesheet">
    </head>
    <body>
        <a id="banner" style="position: absolute; top: 10vw; left: 25vw;"><img src="../res/chatroom_banner.png" class="banner-image clickable"  style="width: 50vw; height: auto;"></a>
        <p class="basic-text unselectable" id="warn" style="margin-top: 3vw; font-weight: 700; font-size: 2vw; position: absolute; top: 95vw; left: 37vw;">DO NOT MISUSE THIS SERVICE! >:(</p>
        <div id="chat" class="main-container" style="display: none; position: absolute; top: 35vw;">
            <div class="row-container">
                <div class="column-container" style="width: 65%;">
                    <div class="large-item">
                        chat
                        <div id="message-box-container">
                            <div id="message-box" style="height: 100%;" class="hide-scrollbar"></div>
                        </div>
                        <input class="input" id="input" maxlength="200" placeholder="type message here :3" style="position: absolute; width: 40vw; height: 1vw; left: 7vw; top: 50vw;"></input>
                    </div>
                </div>
                <div class="column-container" style="width: 25%;">
                    <div class="small-item" style="max-height: 33%;">
                        voice
                        <div></div>
                        <!--<button style="background-color: grey; width: 5vw; height: 2vw; font-size: 1vw; outline: solid black 1px;" id="startVoiceBtn">connect</button>-->
                        <p class="basic-text unselectable" style="padding-left: 3vw; color: darkred">unavaliable</p>
                    </div>
                    <div class="small-item" style="max-height: 33%;">
                        information
                        <p class="basic-text" style="padding-left: 3vw;" id="chatters">Online Chatters: x</p>
                        <p class="basic-text" style="padding-left: 3vw;" id="chat-id">Chat ID: xxx</p>
                    </div>
                    <div class="small-item" style="max-height: 33%;">
                        settings
                        <div></div>
                        <input class="input" id="color" value="#000000" maxlength="7" style="width: 10vw; margin-top: 1vw; margin-left: 0vw; margin-top: 2vw;"></input>                 
                        <input class="input" id="name" placeholder="Name" maxlength="15" style="width: 10vw; margin-top: 2vw; margin-left: 0vw;"></input>
                        <p class="basic-text" style="font-size: 1vw; padding-left: 3vw; margin-top: 1vw;">historical connection messages</p>
                        <input type="checkbox" id="show-con-messages" style="margin-top: 0vw; margin-left: 0vw;"></input>
                    </div>
                </div>
            </div>
            <div class="emoji-container">
                <button id="emoji-btn" class="unselectable">😀</button>
                <div id="emoji-picker" class="hidden">
                    <div class="emoji-header">
                        <div class="emoji-header">
                            <button class="emoji-cat active">All</button>
                            <button class="emoji-cat">Kaomoji</button>
                        </div>
                    </div>
                    <div class="emoji-grid"></div>
                </div>
            </div>   
        </div>
        
        <div id="picker" style="position: absolute; top: 35vw; left: 10vw;">
            <div class="row-container">
                <div class="column-container" style="width: 75%;">
                    <div class="large-item" style="image-rendering: pixelated;">
                        chat picker
                        <div id="chat-picker-list" class="grid-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </body>

    <script type="module" src="chat.js"></script>
</html>
